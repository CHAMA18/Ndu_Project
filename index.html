<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ndu_project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ndu_project</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Loading indicator while Flutter initializes -->
  <style>
    #loading-container {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #ffffff; z-index: 9999;
      transition: opacity 0.3s ease-out;
    }
    #loading-container.fade-out { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 48px; height: 48px; border: 4px solid #e0e0e0;
      border-top: 4px solid #1565C0; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <div id="loading-container">
    <div class="loading-spinner"></div>
  </div>
  <script>
    // Remove loading indicator once Flutter renders
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-container');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.remove(); }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
